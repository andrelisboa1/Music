<h1>Product Listing</h1>

<h3>Filters</h3>
<div class="filter-bar">
    <div class="filter-section">
        <div class="filter-label">Instrumentation:</div>
        <select class="filter-select" id="instrumentation-filter">
            <option value="All">All</option>

            <option value="Orchestral">════ Orchestral</option>
            <option value="Concert Band">Concert Band</option>
            <option value="String Orchestra">String Orchestra</option>
            
            <option value="Solo">════ Solo</option>
            <option value="Solo - Piano">Solo - Piano</option>
            <option value="Solo - Violin">Solo - Violin</option>

            <option value="Chamber">════ Chamber</option>
            <option value="Duet">─── Duet</option>

            <option value="Chamber - Flute Duet">Chamber - Flute Duet</option>
            <option value="Chamber - Clarinet Duet">Chamber - Clarinet Duet</option>
        </select>
    </div>
    <div class="filter-section">
        <div class="filter-label">Difficulty:</div>
        <select class="filter-select" id="difficulty-filter">
            <option value="0">All</option>
            <option value="0.5">0.5</option>
            <option value="1">1</option>
            <option value="1+">1+</option>
            <option value="2">2</option>
            <option value="2+">2+</option>
            <option value="3">3</option>
            <option value="3+">3+</option>
            <option value="4">4</option>
            <option value="4+">4+</option>
            <option value="5">5</option>
            <option value="6">6</option>
        </select>
    </div>
    
</div>
